server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # WASM must be served with the correct MIME type or the browser refuses to compile it
    types {
        application/wasm  wasm;
        text/html         html htm;
        text/css          css;
        application/javascript  js mjs;
        application/json  json;
        image/svg+xml     svg svgz;
        image/png         png;
        image/jpeg        jpg jpeg;
        font/woff2        woff2;
    }

    # SharedArrayBuffer / Atomics — required by some Midnight WASM workers
    add_header Cross-Origin-Opener-Policy  "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Security basics
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # WebSocket upgrade for backend real-time events
    location /api/ws {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Dataset endpoint (same backend, different prefix)
    location /dataset/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Midnight proof server — strip /proof prefix
    location /proof/ {
        proxy_pass         http://proof-server:6300/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
    }

    # ZK artifacts — long cache, immutable after compile
    location /contract/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Override COEP for .wasm so the browser can compile it cross-origin
        add_header Cross-Origin-Resource-Policy "cross-origin";
        try_files $uri =404;
    }

    # Static assets (hashed filenames from Vite build — cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — all other routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
